{% extends "base.html" %}
{% block content %}
<article class="comic">
  <hgroup>
    <a class="inline-block mb-2 uppercase font-light" href="{% url 'comics_index' %}">← comics</a>
    <h1 class="mb-8">{{ comic.title }}</h1>
  </hgroup>
  <div class="comic__viewer relative mx-auto p-8 mb-4 bg-black/10">
    <img class="comic__page mb-8 mx-auto w-full max-w-xl h-auto"
         src="{{ page.image.url }}"
         alt="{{ comic.title }} page {{ page_number }}">
    <nav class="comic__nav flex justify-between">
      {% if has_previous %}
        {% if previous_number == 1 %}
          <a class="comic__prev" href="{% url 'comic_detail' comic.slug %}">← Previous</a>
        {% else %}
          <a class="comic__prev" href="{% url 'comic_page' comic.slug previous_number %}">← Previous</a>
        {% endif %}
      {% endif %}
      {% if has_next %}
        <a class="comic__next" href="{% url 'comic_page' comic.slug next_number %}">Next →</a>
      {% endif %}
    </nav>
    <p class="comic__counter text-center mt-2">Page {{ page_number }} of {{ page_count }}</p>
  </div>
</article>
{% endblock %}
