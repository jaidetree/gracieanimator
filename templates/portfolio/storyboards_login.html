{% extends "base.html" %}
{% block content %}
<div class="login">
  <form action="{% url 'storyboards_auth' %}" method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <h2 class="text-center mb-4">This page is password protected</h2>
    {% if error %}
      <p class="login__error text-center text-red-400 mb-4" role="alert">{{ error }}</p>
    {% endif %}
    <div class="md:flex md:flex-row gap-2 max-w-md m-auto">
      <input
        type="password"
        name="password"
        placeholder="password"
        aria-label="Password"
        autofocus
        class="bg-black bg-opacity-20 px-4 py-2 text-xl text-white w-full rounded-sm placeholder:text-white placeholder:text-opacity-75"
      >
      <button type="submit" class="text-white border-white border rounded-sm px-4 py-2 text-sm">Login</button>
    </div>
  </form>
</div>
{% endblock %}
