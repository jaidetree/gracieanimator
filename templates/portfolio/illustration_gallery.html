{% extends "base.html" %}
{% block content %}
<section class="illustration-gallery flex flex-col gap-8">
  <h1>Illustrations</h1>
  {% for illustration in illustrations %}
    <figure class="illustration">
      <img class="w-full" src="{{ illustration.gallery_image.url }}" alt="{{ illustration.title }}">
    </figure>
  {% empty %}
    <p class="paragraph">No illustrations yet.</p>
  {% endfor %}
</section>
{% endblock %}
