{% extends "base.html" %}
{% block content %}
<div class="flex flex-wrap gap-4 justify-center md:justify-start">
  {% for item in featured %}
    <a class="block max-w-xs w-full text-center" href="{{ item.url }}">
      {% include "portfolio/_thumbnail.html" with url=item.thumbnail_url img_class="object-cover h-64 w-full" alt=item.label %}
      <span class="uppercase text-lg font-body font-light">{{ item.label }}</span>
    </a>
  {% empty %}
    <p class="paragraph">Nothing here yet.</p>
  {% endfor %}
</div>
{% endblock %}
