[pytest]
DJANGO_SETTINGS_MODULE = config.test_settings
python_files = tests.py test_*.py *_tests.py
# Skip live provider tests by default: the normal suite makes no network calls
# (ADR-0002). Opt in with `pytest -m live`. E2E browser tests need a Playwright
# browser (`playwright install chromium`); opt in with `pytest -m e2e`.
addopts = --reuse-db -m "not live and not e2e"
markers =
    live: hits real external providers over the network (opt-in, may be flaky)
    e2e: drives a real browser via Playwright against a live server (opt-in, needs chromium)
