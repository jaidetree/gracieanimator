[pytest]
DJANGO_SETTINGS_MODULE = config.test_settings
python_files = tests.py test_*.py *_tests.py
# Skip live provider tests by default: the normal suite makes no network calls
# (ADR-0002). Opt in with `pytest -m live`.
addopts = --reuse-db -m "not live"
markers =
    live: hits real external providers over the network (opt-in, may be flaky)
