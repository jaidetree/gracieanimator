name: CI

# Runs the test suite, then lint, on the Django rebuild branch and on `main`
# (which the rebuild will eventually merge into), plus their PRs.
on:
  push:
    branches: [django, main]
  pull_request:
    branches: [django, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gracie
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before running steps.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # config.test_settings forces APP_ENV=test, but base settings still read
      # DATABASE_URL. The local default uses a unix socket; the service container
      # speaks TCP, so point at localhost explicitly.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/gracie

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
